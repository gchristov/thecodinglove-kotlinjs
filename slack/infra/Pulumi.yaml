name: thecodinglove-slack
runtime: yaml
description: Deploys the Slack infra

variables:
  domain: thecodinglove.crowdstandout.com
  location: europe-west1
  repositoryId: thecodinglove

resources:

  ########################################
  # slack-service
  ########################################

  # Manages the binary.
  slack-service-binary:
    type: docker:Image
    properties:
      build:
        args:
          PORT: "8084"
          API_URL: https://${domain}/api
          SLACK_REQUEST_VERIFICATION: "true"
          SLACK_SLASH_COMMAND_RECEIVED_PUBSUB_TOPIC: slack_slash_command_received
          SLACK_INTERACTIVITY_RECEIVED_PUBSUB_TOPIC: slack_interactivity_received
          SLACK_SELF_DESTRUCT_MESSAGE_PUBSUB_TOPIC: slack_self_destruct_message
        platform: linux/amd64
        context: ../service/build/dist/js
      imageName: ${location}-docker.pkg.dev/${gcp:project}/${repositoryId}/slack-service:latest
      registry:
        server: ${location}-docker.pkg.dev
        username: _json_key
        password:
          fn::secret:
            fn::readFile: ${gcp:credentials}
    options:
      protect: true
  # Manages the Cloud Run service.
  slack-service:
    type: gcp:cloudrunv2:Service
    properties:
      ingress: INGRESS_TRAFFIC_ALL
      location: ${location}
      name: slack-service
      template:
        containers:
          - image: ${slack-service-binary.repoDigest}
            ports:
              containerPort: 8084
              name: http1
            resources:
              cpuIdle: true
              limits:
                cpu: 1000m
                memory: 512Mi
            startupProbe:
              failureThreshold: 1
              periodSeconds: 240
              tcpSocket:
                port: 8084
              timeoutSeconds: 240
        maxInstanceRequestConcurrency: 80
        scaling:
          maxInstanceCount: 100
          minInstanceCount: 1
        timeout: 300s
      traffics:
        - percent: 100
          type: TRAFFIC_TARGET_ALLOCATION_TYPE_LATEST
    options:
      version: 8.6.0
      protect: true
  # Manages the Cloud Run service policy.
  slack-service-policy:
    type: gcp:cloudrunv2:ServiceIamPolicy
    properties:
      name: ${slack-service.name}
      location: ${location}
      policyData: |
        {
          "bindings": [
            {
              "role": "roles/run.invoker",
              "members": [
                "allUsers"
              ]
            }
          ]
        }
    options:
      version: 8.6.0
      protect: true

  ########################################
  # Pub/Sub
  ########################################

  # Manages the Slack interactivity received PubSub topic.
  pubsub-topic-slack-interactivity-received:
    type: gcp:pubsub:Topic
    properties:
      name: slack_interactivity_received
    options:
      version: 8.6.0
      protect: true
  # Manages the Slack interactivity received PubSub subscription.
  pubsub-subscription-slack-interactivity-received:
    type: gcp:pubsub:Subscription
    properties:
      ackDeadlineSeconds: 10
      expirationPolicy:
        ttl: ""
      messageRetentionDuration: 600s
      name: slack_interactivity_received_subscription
      pushConfig:
        pushEndpoint: ${slack-service.uri}/api/pubsub/slack/interactivity
      retryPolicy:
        maximumBackoff: 600s
        minimumBackoff: 10s
      topic: ${pubsub-topic-slack-interactivity-received.name}
    options:
      version: 8.6.0
      protect: true
  # Manages the Slack slash command received PubSub topic.
  pubsub-topic-slack-slash-command-received:
    type: gcp:pubsub:Topic
    properties:
      name: slack_slash_command_received
    options:
      version: 8.6.0
      protect: true
  # Manages the Slack slash command received PubSub subscription.
  pubsub-subscription-slack-slash-command-received:
    type: gcp:pubsub:Subscription
    properties:
      ackDeadlineSeconds: 10
      expirationPolicy:
        ttl: ""
      messageRetentionDuration: 600s
      name: slack_slash_command_received_subscription
      pushConfig:
        pushEndpoint: ${slack-service.uri}/api/pubsub/slack/search
      retryPolicy:
        maximumBackoff: 600s
        minimumBackoff: 10s
      topic: ${pubsub-topic-slack-slash-command-received.name}
    options:
      version: 8.6.0
      protect: true
  # Manages the self-destruct message PubSub topic. Published to (with a Cloud Tasks delay) when a
  # self-destructing message is sent, consumed by this same service once the delay elapses.
  pubsub-topic-slack-self-destruct-message:
    type: gcp:pubsub:Topic
    properties:
      name: slack_self_destruct_message
    options:
      version: 8.6.0
      protect: true
  # Manages the self-destruct message PubSub subscription.
  pubsub-subscription-slack-self-destruct-message:
    type: gcp:pubsub:Subscription
    properties:
      ackDeadlineSeconds: 10
      expirationPolicy:
        ttl: ""
      messageRetentionDuration: 600s
      name: slack_self_destruct_message_subscription
      pushConfig:
        pushEndpoint: ${slack-service.uri}/api/pubsub/self-destruct-message
      retryPolicy:
        maximumBackoff: 600s
        minimumBackoff: 10s
      topic: ${pubsub-topic-slack-self-destruct-message.name}
    options:
      version: 8.6.0
      protect: true

outputs:
  slackServiceHost: ${slack-service.uri}
  slackServicePath: api/slack
  slackServicePubSubPath: api/pubsub/slack
  slackServiceSelfDestructMessagePubSubPath: api/pubsub/self-destruct-message