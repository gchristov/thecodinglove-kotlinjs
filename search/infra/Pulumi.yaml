name: thecodinglove-search
runtime: yaml
description: Deploys the search infra

variables:
  domain: thecodinglove.crowdstandout.com
  location: europe-west1
  repositoryId: thecodinglove

resources:

  ########################################
  # search-service
  ########################################

  # Manages the binary.
  search-service-binary:
    type: docker:Image
    properties:
      build:
        args:
          PORT: "8081"
          API_URL: https://${domain}/api
          PRELOAD_SEARCH_PUBSUB_TOPIC: search_session_result_created
        platform: linux/amd64
        context: ../service/build/dist/js
      imageName: ${location}-docker.pkg.dev/${gcp:project}/${repositoryId}/search-service:latest
      registry:
        server: ${location}-docker.pkg.dev
        username: _json_key
        password:
          fn::secret:
            fn::readFile: ${gcp:credentials}
    options:
      protect: true
  # Manages the Cloud Run service.
  search-service:
    type: gcp:cloudrunv2:Service
    properties:
      ingress: INGRESS_TRAFFIC_ALL
      location: ${location}
      name: search-service
      template:
        containers:
          - image: ${search-service-binary.repoDigest}
            ports:
              containerPort: 8081
              name: http1
            resources:
              cpuIdle: true
              limits:
                cpu: 1000m
                memory: 512Mi
            startupProbe:
              failureThreshold: 1
              periodSeconds: 240
              tcpSocket:
                port: 8081
              timeoutSeconds: 240
        maxInstanceRequestConcurrency: 80
        scaling:
          maxInstanceCount: 100
          minInstanceCount: 0
        timeout: 300s
      traffics:
        - percent: 100
          type: TRAFFIC_TARGET_ALLOCATION_TYPE_LATEST
    options:
      version: 8.6.0
      protect: true
  # Manages the Cloud Run service policy.
  search-service-policy:
    type: gcp:cloudrunv2:ServiceIamPolicy
    properties:
      name: ${search-service.name}
      location: ${location}
      policyData: |
        {
          "bindings": [
            {
              "role": "roles/run.invoker",
              "members": [
                "allUsers"
              ]
            }
          ]
        }
    options:
      version: 8.6.0
      protect: true

  ########################################
  # Pub/Sub
  ########################################

  # Manages the search session result created PubSub topic.
  pubsub-topic-search-session-result-created:
    type: gcp:pubsub:Topic
    properties:
      name: search_session_result_created
    options:
      version: 8.6.0
      protect: true
  # Manages the search session result created PubSub subscription.
  pubsub-subscription-search-session-result-created:
    type: gcp:pubsub:Subscription
    properties:
      ackDeadlineSeconds: 10
      expirationPolicy:
        ttl: ""
      messageRetentionDuration: 600s
      name: search_session_result_created_subscription
      pushConfig:
        pushEndpoint: ${search-service.uri}/api/pubsub/search/session-result-created
      retryPolicy:
        maximumBackoff: 600s
        minimumBackoff: 10s
      topic: ${pubsub-topic-search-session-result-created.name}
    options:
      version: 8.6.0
      protect: true

outputs:
  searchServiceHost: ${search-service.uri}
  searchServicePath: api/search
  searchServicePubSubPath: api/pubsub/search/session-result-created