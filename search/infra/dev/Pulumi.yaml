name: thecodinglove-search-dev
runtime: yaml
description: Deploys the Search dev infra (PR builds)

resources:

  ########################################
  # Pub/Sub (dev)
  ########################################

  # Manages the dev preload search PubSub topic.
  pubsub-topic-preload-search-dev:
    type: gcp:pubsub:Topic
    properties:
      name: preload_search_dev
    options:
      version: 8.6.0
      protect: true
  # Manages the dev preload search PubSub subscription.
  pubsub-subscription-preload-search-dev:
    type: gcp:pubsub:Subscription
    properties:
      ackDeadlineSeconds: 10
      expirationPolicy:
        ttl: ""
      messageRetentionDuration: 600s
      name: preload_search_dev_subscription
      pushConfig:
        # If this changes, update the tunnel URL in run_local.sh and all other infra/dev Pulumi files too.
        pushEndpoint: https://codinglove.serveousercontent.com/api/pubsub/search
      retryPolicy:
        maximumBackoff: 600s
        minimumBackoff: 10s
      topic: ${pubsub-topic-preload-search-dev.name}
    options:
      version: 8.6.0
      protect: true
